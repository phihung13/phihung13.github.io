<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sài Gòn — một thành phố sống</title>
<meta name="description" content="Thành phố Sài Gòn isometric rộng 64×64 ô: kéo để đi, lăn chuột để phóng, có ngày và đêm, có mưa, có kênh và cầu — và có thiên tai nếu bạn muốn.">
<style>
  :root { color-scheme: dark; --bg:#0f1216; --panel:#171b21; --line:#2b313a; --ink:#ddd6c7; --dim:#8b8577; }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 14px/1.5 ui-monospace, "SF Mono", Consolas, monospace;
    display: flex; flex-direction: column; overflow: hidden;
  }
  header {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    padding: 10px 14px; background: var(--panel); border-bottom: 1px solid var(--line);
  }
  h1 { margin: 0; font-size: 22px; letter-spacing: .03em; white-space: nowrap; }
  h1 small { display: block; font-size: 11px; color: var(--dim); letter-spacing: 0; font-weight: 400; }
  .group { display: flex; gap: 6px; align-items: center; }
  .spacer { flex: 1; }
  button {
    font: inherit; padding: 8px 12px; border-radius: 6px; cursor: pointer;
    border: 1px solid var(--line); background: #20252c; color: var(--ink);
    transition: background .15s, transform .06s;
  }
  button:hover { background: #2a3038; }
  button:active { transform: translateY(1px); }
  button.reset { border-color: #3f7d52; color: #9fd8b3; }
  input[type=range] { width: 130px; accent-color: #c78d24; }
  label { color: var(--dim); font-size: 11px; display: flex; gap: 6px; align-items: center; }
  #wrap { position: relative; flex: 1; min-height: 0; }
  canvas { width: 100%; height: 100%; display: block; cursor: grab; touch-action: none; }
  canvas:active { cursor: grabbing; }
  #hud {
    position: absolute; left: 12px; bottom: 12px; right: 12px;
    display: flex; justify-content: space-between; align-items: flex-end;
    pointer-events: none; text-shadow: 0 1px 4px #000; font-size: 12px;
  }
  #hint { color: var(--dim); }
  a { color: #7fb0c8; }
</style>
</head>
<body>

<header>
  <h1>SÀI GÒN<small>3D · 64 × 64 ô · nắng thật, bóng đổ thật</small></h1>

  <div class="group">
    <button data-kind="flood">🌊 Thuỷ triều</button>
    <button data-kind="earthquake">🌍 Động đất</button>
    <button data-kind="lightning">⚡ Sấm sét</button>
    <button data-kind="war">🚀 Tên lửa</button>
    <button data-kind="reset" class="reset">♻️ Xây lại</button>
  </div>

  <div class="group">
    <button id="rain">🌧️ Mưa</button>
    <label>giờ <input id="clock" type="range" min="0" max="23.9" step="0.1" value="9"></label>
  </div>

  <div class="spacer"></div>
  <a href="https://github.com/phihung13">github.com/phihung13</a>
</header>

<div id="wrap">
  <canvas id="cv"></canvas>
  <div id="hud">
    <span id="stat">thành phố nguyên vẹn</span>
    <span id="hint">kéo trái để đi · kéo phải để xoay · lăn chuột để phóng to · bấm vào bản đồ để dội tên lửa xuống đó</span>
    <span><b id="time">09:00</b> · <span id="fps"></span></span>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
  }
}
</script>
<script type="module" src="./main.js"></script>
</body>
</html>
